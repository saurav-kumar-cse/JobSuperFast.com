<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Details — JobSuperFast</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .detail-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; margin: 20px 0 40px; }
  .detail-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 18px; }
  .detail-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; margin: 6px 0; max-width: 640px; }
  .detail-table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  .detail-table th, .detail-table td { text-align: left; padding: 12px 14px; border: 1px solid var(--border); font-size: 13.5px; }
  .detail-table th { width: 220px; background: var(--bg); color: var(--text-muted); font-weight: 600; }
  .section-title { font-family: var(--font-display); font-size: 16px; font-weight: 700; margin: 26px 0 10px; }
  .links-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 700px) { .links-grid { grid-template-columns: 1fr; } .detail-table th { width: 140px; } }
</style>
</head>
<body>

<div id="app-utility"></div>
<div id="app-ticker"></div>
<div id="app-header"></div>

<main class="container">
  <div id="job-detail-content">
    <!-- filled by script below -->
  </div>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2025 JobSuperFast. All information is for reference only — always verify on official websites.</span>
    </div>
  </div>
</footer>

<div id="app-modals"></div>

<script src="firebase-config.js"></script>
<script src="script.js"></script>
<script>
  function renderJobDetail() {
    const id = new URLSearchParams(window.location.search).get("id");
    const job = loadJobs().find((j) => j.id === id);
    const el = document.getElementById("job-detail-content");

    if (!job) {
      el.innerHTML = `<div class="empty-state"><div class="icon">🔍</div>Job not found.<br><a href="jobs.html" class="btn btn-outline" style="margin-top:14px;">Back to All Jobs</a></div>`;
      return;
    }

    const saved = getSavedJobIds().includes(job.id);
    document.title = job.title + " — JobSuperFast";

    el.innerHTML = `
      <div class="detail-card">
        <div class="detail-header">
          <div>
            <div class="badge-row">${badgeHtml(job.badges)}<span class="badge location">📍 ${job.state}</span></div>
            <div class="detail-title">${job.title}</div>
            <div style="color:var(--text-muted); font-size:13.5px;">${job.orgFull}</div>
          </div>
          <button class="btn ${saved ? "btn-accent" : "btn-outline"}" onclick="this.textContent = toggleSaveJob('${job.id}') ? '★ Saved' : '☆ Save Job'; this.classList.toggle('btn-accent'); renderHeader();">
            ${saved ? "★ Saved" : "☆ Save Job"}
          </button>
        </div>

        <table class="detail-table">
          <tr><th>Organization</th><td>${job.orgFull}</td></tr>
          <tr><th>Total Vacancies</th><td>${job.totalVacancies}</td></tr>
          <tr><th>Educational Qualification</th><td>${job.qualification}</td></tr>
          <tr><th>Age Limit</th><td>${job.ageLimit}</td></tr>
          <tr><th>Application Fee</th><td>${job.fee}</td></tr>
          <tr><th>Last Date to Apply</th><td>${job.lastDate}</td></tr>
        </table>

        <div class="section-title">📝 About This Recruitment</div>
        <p style="font-size:14px; line-height:1.7; color:var(--text-muted);">${job.details}</p>

        <div class="section-title">🔗 Important Links</div>
        <div class="links-grid">
          <a href="${job.applyLink}" class="btn btn-accent btn-block">Apply Online</a>
          <a href="${job.notificationLink}" class="btn btn-primary btn-block">Download Notification</a>
          <a href="#" class="btn btn-outline btn-block">Official Website</a>
        </div>
      </div>
    `;
  }
  renderJobDetail();
</script>
</body>
</html>
